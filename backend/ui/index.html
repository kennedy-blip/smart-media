<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCanvas Pro | Edge Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#0b0f1a] text-gray-100 min-h-screen font-sans">
    <nav class="border-b border-gray-800 p-4 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-500">SMARTCANVAS <span class="text-gray-500 font-light">PRO</span></h1>
            <div id="status-tag" class="text-xs font-mono text-green-500 uppercase">System Ready</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-4">
        <div id="drop-area" class="border-2 border-dashed border-gray-700 rounded-3xl p-16 text-center hover:border-blue-500 transition-all cursor-pointer bg-gray-900/50">
            <input type="file" id="fileElem" class="hidden" accept="image/*">
            <p class="text-xl font-medium">Upload Document for Neural Scan</p>
            <p class="text-gray-500 mt-2">Tesseract.js will process text locally in your browser</p>
        </div>

        <div id="preview-section" class="mt-12 hidden space-y-6">
            <img id="img-view" class="w-full rounded-2xl border border-gray-800 shadow-2xl">
            <div class="flex gap-4">
                <button id="reset-btn" class="flex-1 py-4 rounded-xl bg-gray-800 font-bold">Reset</button>
                <button id="process-btn" class="flex-[2] py-4 rounded-xl bg-blue-600 font-bold hover:bg-blue-500">Start OCR Scan</button>
            </div>
        </div>

        <div id="results" class="mt-12 hidden">
            <h3 class="text-xl font-bold mb-4">Detected Text Blocks</h3>
            <div id="json-output" class="bg-gray-900 p-6 rounded-xl font-mono text-sm text-blue-300 overflow-x-auto"></div>
            <button id="finalize-btn" class="w-full mt-6 py-4 rounded-xl bg-green-600 font-bold hover:bg-green-500">Apply Neural Inpainting & Export</button>
        </div>

        <div id="final-output-section" class="mt-12 hidden">
            <h3 class="text-xl font-bold mb-4 text-green-400">Processed Result</h3>
            <img id="final-img" class="w-full rounded-2xl border-2 border-green-900">
            <a id="download-link" class="block text-center mt-4 text-blue-400 underline">Download Cleaned Document</a>
        </div>
    </main>

    <script>
        const fileElem = document.getElementById('fileElem');
        const dropArea = document.getElementById('drop-area');
        const preview = document.getElementById('preview-section');
        const imgView = document.getElementById('img-view');
        const processBtn = document.getElementById('process-btn');
        const results = document.getElementById('results');
        const jsonOutput = document.getElementById('json-output');
        const finalizeBtn = document.getElementById('finalize-btn');

        let detectedBlocks = [];

        dropArea.onclick = () => fileElem.click();
        fileElem.onchange = () => {
            const file = fileElem.files[0];
            if (file) {
                imgView.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
                dropArea.classList.add('hidden');
            }
        };

        processBtn.onclick = async () => {
            processBtn.disabled = true;
            processBtn.innerText = "Initializing Tesseract Engine...";
            
            try {
                const worker = await Tesseract.createWorker('eng');
                const { data: { words } } = await worker.recognize(fileElem.files[0]);
                
                detectedBlocks = words.map(w => ({
                    text: w.text,
                    x: w.bbox.x0, y: w.bbox.y0,
                    w: w.bbox.x1 - w.bbox.x0, h: w.bbox.y1 - w.bbox.y0
                }));

                await worker.terminate();
                results.classList.remove('hidden');
                jsonOutput.innerText = JSON.stringify(detectedBlocks.slice(0, 5), null, 2) + "\n...and more";
                processBtn.innerText = "Scan Successful";
            } catch (err) {
                alert("OCR Error: " + err.message);
                processBtn.disabled = false;
            }
        };

        finalizeBtn.onclick = async () => {
            finalizeBtn.disabled = true;
            finalizeBtn.innerText = "Sending to Render Backend...";
            
            const formData = new FormData();
            formData.append('file', fileElem.files[0]);
            formData.append('modified_blocks', JSON.stringify(detectedBlocks));

            try {
                const response = await fetch('/process-final', { method: 'POST', body: formData });
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                document.getElementById('final-img').src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('download-link').download = "cleaned_doc.jpg";
                document.getElementById('final-output-section').classList.remove('hidden');
                finalizeBtn.innerText = "Processing Complete";
            } catch (err) {
                alert("Backend Error: " + err.message);
                finalizeBtn.disabled = false;
            }
        };

        document.getElementById('reset-btn').onclick = () => location.reload();
    </script>
</body>
</html>
