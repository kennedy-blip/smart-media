<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCanvas Pro | Neural Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-border { border: 1px solid; border-image: linear-gradient(to right, #3b82f6, #8b5cf6) 1; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#0b0f1a] text-gray-100 min-h-screen font-sans">
    <nav class="border-b border-gray-800 p-4 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                SMARTCANVAS <span class="text-gray-500 font-light">PRO</span>
            </h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-mono text-green-500 uppercase">Neural Engine Online</span>
            </div>
        </div>
        
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-4">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-extrabold mb-4 tracking-tight">Document Processor</h2>
            <p class="text-gray-400 text-lg">AI-Powered OCR & Intelligent Inpainting Engine</p>
        </div>

        <div id="drop-area" class="border-2 border-dashed border-gray-700 rounded-3xl p-16 text-center hover:border-blue-500 transition-all cursor-pointer bg-gray-900/50 group">
            <input type="file" id="fileElem" class="hidden" accept="image/*">
            <div class="space-y-6">
                <div class="w-20 h-20 bg-gray-800 rounded-full flex items-center justify-center mx-auto group-hover:bg-blue-900/30 transition-colors">
                    <svg class="w-10 h-10 text-gray-500 group-hover:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                </div>
                <div>
                    <p class="text-xl font-medium">Select a Document</p>
                    <p class="text-gray-500 mt-2">Drag and drop or click to browse</p>
                </div>
            </div>
        </div>

        <div id="preview-section" class="mt-12 hidden space-y-8">
            <div class="relative rounded-2xl overflow-hidden border border-gray-800 shadow-2xl">
                <img id="img-view" class="w-full h-auto">
            </div>
            
            <div class="flex gap-4">
                <button id="reset-btn" class="flex-1 py-4 rounded-xl bg-gray-800 hover:bg-gray-700 font-bold transition-all">Clear</button>
                <button id="process-btn" class="flex-[2] py-4 rounded-xl bg-blue-600 hover:bg-blue-500 font-bold shadow-lg shadow-blue-900/20 transition-all">Run Neural Scan</button>
            </div>
        </div>

        <div id="results" class="mt-12 hidden">
            <h3 class="text-xl font-bold mb-4">OCR Extraction Results</h3>
            <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden p-6 font-mono text-sm text-blue-300" id="json-output">
                </div>
        </div>
    </main>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileElem = document.getElementById('fileElem');
        const preview = document.getElementById('preview-section');
        const imgView = document.getElementById('img-view');
        const processBtn = document.getElementById('process-btn');
        const results = document.getElementById('results');

        dropArea.onclick = () => fileElem.click();

        fileElem.onchange = () => {
            const file = fileElem.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imgView.src = e.target.result;
                    preview.classList.remove('hidden');
                    dropArea.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        };

        processBtn.onclick = async () => {
            processBtn.disabled = true;
            processBtn.innerText = "Processing Neural Weights...";
            
            const formData = new FormData();
            formData.append('file', fileElem.files[0]);

            try {
                const response = await fetch('/scan', { method: 'POST', body: formData });
                const data = await response.json();
                
                results.classList.remove('hidden');
                document.getElementById('json-output').innerText = JSON.stringify(data, null, 2);
                processBtn.innerText = "Scan Complete";
            } catch (err) {
                alert("Error connecting to Neural Engine");
                processBtn.disabled = false;
                processBtn.innerText = "Run Neural Scan";
            }
        };

        document.getElementById('reset-btn').onclick = () => location.reload();
    </script>
</body>
</html>
